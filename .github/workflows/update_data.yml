name: Daily Data Collector

# 언제 실행할 것인가?
on:
  schedule:
    # 한국 시간 기준 매일 아침 8시에 실행 (UTC 기준 23시)
    - cron: '0 23 * * *'
  workflow_dispatch: # 깃허브 웹사이트에서 수동으로 버튼을 눌러 실행할 수 있게 함

jobs:
  update-data:
    runs-on: ubuntu-latest
    # 봇이 레포지토리에 파일을 덮어쓸 수 있도록 권한 부여
    permissions:
      contents: write 

    steps:
      - name: 1. 저장소 코드 가져오기
        uses: actions/checkout@v3
        
      - name: 2. 파이썬 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 3. 필요한 라이브러리 설치
        run: |
          pip install -r requirements.txt
          
      - name: 4. 데이터 수집 스크립트 실행 (API 키 주입)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python collector.py
          
      - name: 5. 수집된 결과(result.json)를 깃허브에 자동 커밋 및 푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add result.json
          git commit -m "Auto-update data: result.json" || echo "No changes to commit"
          git pull --rebase origin main   # <--- 밀어넣기 전에 최신 상태를 당겨와서 부드럽게 합치는 마법의 명령어입니다.
          git push